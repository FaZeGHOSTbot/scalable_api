openapi: 3.0.0
info:
  title: Scalable REST API
  version: 1.0.0
  description: API documentation for authentication and task management

servers:
  - url: http://localhost:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:

  /api/v1/auth/register:
    post:
      summary: Register a new user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: Lucifer
                email:
                  type: string
                  example: lucifer@test.com
                password:
                  type: string
                  example: 123456
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Validation error

  /api/v1/auth/login:
    post:
      summary: Login user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: lucifer@test.com
                password:
                  type: string
                  example: 123456
      responses:
        '200':
          description: Login successful
        '400':
          description: Invalid credentials

  /api/v1/tasks:
    get:
      summary: Get all tasks for logged-in user
      tags:
        - Tasks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of tasks
        '401':
          description: Unauthorized

    post:
      summary: Create a new task
      tags:
        - Tasks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  example: Learn Node.js
                description:
                  type: string
                  example: Complete REST API project
      responses:
        '201':
          description: Task created
        '401':
          description: Unauthorized

  /api/v1/tasks/{id}:
    put:
      summary: Update a task
      tags:
        - Tasks
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Task ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Updated Task
                description:
                  type: string
                  example: Updated description
      responses:
        '200':
          description: Task updated
        '404':
          description: Task not found

    delete:
      summary: Delete a task
      tags:
        - Tasks
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Task ID
      responses:
        '200':
          description: Task deleted
        '404':
          description: Task not found